{% import "macros/icon.html" as icons %}
<div class="gpg-key-wrapper">
    <button class="copy-btn floating" onclick="copyGpgKey(this)">
        {{ icons::icon(name="copy") }}
    </button>
    <pre id="gpg-key-block">{{ load_data(path=path) }}</pre>
</div>

<template id="icon-check">
    {{ icons::icon(name="check") }}
</template>

<script>
    function copyGpgKey(btn) {
        const keyBlock = document.getElementById('gpg-key-block');
        const text = keyBlock.innerText;
        navigator.clipboard.writeText(text).then(() => {
            const originalHtml = btn.innerHTML;
            btn.innerHTML = document.getElementById('icon-check').innerHTML;
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.classList.remove('copied');
            }, 2000);
        });
    }
</script>
