<!DOCTYPE html>
<html lang="{{ config.default_language }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}{{ config.title }}{% endblock title %}</title>

    <link rel="stylesheet" href="/fonts.css">
    <link rel="stylesheet" href="/fontawesome/css/fontawesome.css">
    <link rel="stylesheet" href="/main.css">



    {% block extra_head %}
    <meta property="og:title" content="{{ config.title }}" />
    <meta property="og:image" content="{{ get_url(path='portrait.jpg') }}" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="{{ get_url(path='apple-touch-icon.png' ) }}">
    <link rel="icon" href="{{ get_url(path='favicon.svg' ) }}" type="image/svg+xml">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ get_url(path='favicon-32x32.png' ) }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ get_url(path='favicon-16x16.png' ) }}">
    <link rel="manifest" href="{{ get_url(path='site.webmanifest' ) }}">
    <link rel="mask-icon" href="{{ get_url(path='safari-pinned-tab.svg' ) }}" color="#2f363d">

    <meta name="apple-mobile-web-app-title" content="{{ config.title }}">
    <meta name="application-name" content="{{ config.title }}">
    <meta name="msapplication-TileColor" content="#2f363d">
    <meta name="theme-color" content="#2f363d">
    {% endblock extra_head %}
</head>

<body class="{% block body_class %}{% endblock body_class %}">
    <main>
        {% block content %}
        {% endblock content %}
    </main>
</body>

</html>
