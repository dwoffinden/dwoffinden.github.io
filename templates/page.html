{% extends "base.html" %}

{% block title %}
{{ page.title }} | {{ config.title }}
{% endblock title %}

{% block content %}
<article>
    <h1>{{ page.title }}</h1>
    <div class="page-content">
        {{ page.content | safe }}
    </div>

    <div class="back-link">
        <a href="/">&larr; Back to Home</a>
    </div>
</article>

<style>
    main {
        display: block !important;
        margin-top: 2rem !important;
    }

    article {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
    }


    .gpg-key-container {
        text-align: center;
        margin: 2rem 0;
    }

    .gpg-key-wrapper {
        position: relative;
        display: inline-block;
        text-align: left;
        max-width: 100%;
        margin: 0 auto;
    }

    .gpg-key-wrapper pre {
        margin: 0;
        padding-top: 3rem;
        /* Space for the floating button */
    }

    .copy-btn.floating {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        margin: 0;
        z-index: 10;
        opacity: 0.7;
        transition: opacity 0.2s;
    }

    .copy-btn.floating:hover {
        opacity: 1;
    }

    .copy-btn.copied {
        border-color: #2ea043;
        color: #2ea043;
        opacity: 1;
    }

    h1 {

        margin-bottom: 2rem;
        font-size: 2rem;
    }


    .back-link {
        margin-top: 3rem;
    }
</style>
{% endblock content %}
