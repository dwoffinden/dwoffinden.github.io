{% extends "base.html" %}

{% block title %}
{{ page.title }} | {{ config.title }}
{% endblock title %}

{% block body_class %}page-layout{% endblock body_class %}

{% block content %}
<article>
    <h1>{{ page.title }}</h1>
    <div class="page-content">
        {{ page.content | safe }}
    </div>

    <div class="back-link">
        <a href="/">&larr; Back to Home</a>
    </div>
</article>
{% endblock content %}
