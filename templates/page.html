{% extends "base.html" %}

{% block title %}
{{ page.title }} | {{ config.title }}
{% endblock title %}

{% block content %}
<article>
    <h1>{{ page.title }}</h1>
    <div class="page-content">
        {{ page.content | safe }}
    </div>

    <div class="back-link">
        <a href="/">&larr; Back to Home</a>
    </div>
</article>

<style>
    main {
        margin-top: 0 !important;
    }

    article {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
    }


    h1 {
        margin-bottom: 2rem;
        font-size: 2rem;
    }


    .back-link {
        margin-top: 3rem;
    }
</style>
{% endblock content %}
